<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Tower Bloxx</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      :root {
        --bg-color: #8bc400;
        --primary-color: #27360d;
        --text-color: #27360d;
        --accent-color: #27360d;
        font-family: sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        touch-action: manipulation;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
      }

      /* Settings UI */
      #settings-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        color: var(--primary-color);
        transition: transform 0.3s ease;
      }

      #settings-toggle:hover {
        transform: rotate(45deg);
      }

      #settings-panel {
        position: absolute;
        top: 0;
        right: -250px;
        width: 200px;
        height: 100%;
        background: var(--bg-color);
        border-left: 4px solid var(--primary-color);
        z-index: 90;
        padding: 60px 20px 20px 20px;
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      #settings-panel.open {
        right: 0;
      }

      .setting-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .setting-label {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
      }

      input[type="color"] {
        width: 100%;
        height: 30px;
        border: 2px solid var(--primary-color);
        background: none;
        cursor: pointer;
      }

      input[type="checkbox"] {
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: var(--primary-color);
      }

      #ui {
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        z-index: 10;
      }

      .score-box {
        padding: 10px;
        text-align: center;
      }

      #score {
        font-family: monospace;
        font-weight: bold;
        font-size: 24px;
      }

      #streak-ui {
        font-size: 12px;
        color: var(--accent-color);
        font-weight: bold;
        height: 15px;
      }

      #combo-text {
        color: var(--accent-color);
        font-size: 14px;
        height: 20px;
        transition: transform 0.1s;
      }

      #menu {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        text-align: center;
        padding: 20px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 30px;
        color: var(--primary-color);
        text-shadow: 2px 2px rgba(0, 0, 0, 0.1);
      }

      .btn {
        background: var(--primary-color);
        color: var(--bg-color);
        padding: 15px 30px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        transition:
          transform 0.1s,
          background-color 0.3s;
      }

      .btn:active {
        transform: scale(0.95);
      }

      .instructions {
        margin-top: 20px;
        font-size: 10px;
        line-height: 1.6;
        color: var(--text-color);
        opacity: 0.7;
      }

      #msg-popup {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--accent-color);
        font-size: 18px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        font-weight: bold;
        text-align: center;
        z-index: 15;
      }

      .shake {
        animation: shake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-1px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(2px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-4px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(4px, 0, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <!-- Settings Icon -->
      <button id="settings-toggle" aria-label="Settings">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </button>

      <!-- Settings Panel -->
      <div id="settings-panel">
        <div class="setting-item">
          <span class="setting-label">Background</span>
          <input type="color" id="bg-picker" value="#8BC400" />
        </div>
        <div class="setting-item">
          <span class="setting-label">Theme Color</span>
          <input type="color" id="primary-picker" value="#27360D" />
        </div>
        <div class="setting-item">
          <div class="toggle-row">
            <span class="setting-label">Sound</span>
            <input type="checkbox" id="sound-toggle" checked />
          </div>
        </div>
        <div class="setting-item">
          <div class="toggle-row">
            <span class="setting-label">Haptics</span>
            <input type="checkbox" id="haptic-toggle" checked />
          </div>
        </div>
        <button
          class="btn"
          id="close-settings"
          style="margin-top: auto; padding: 10px"
        >
          CLOSE
        </button>
      </div>

      <div id="ui">
        <div class="score-box">
          <div style="font-size: 10px; margin-bottom: 5px">SCORE</div>
          <div id="score">0</div>
        </div>
        <div id="streak-ui"></div>
        <div id="combo-text"></div>
      </div>

      <div id="msg-popup">PERFECT!</div>

      <canvas id="gameCanvas"></canvas>

      <div id="menu">
        <h1 id="title">TOWER BLOXX</h1>
        <div id="final-stats" style="display: none; margin-bottom: 20px">
          <p>Blocks: <span id="final-blocks">0</span></p>
          <p>Best: <span id="high-score">0</span></p>
        </div>
        <button id="start-btn" class="btn">START GAME</button>
        <div class="instructions">
          TAP OR CLICK TO DROP BLOCK<br /><br />
          LAND PERFECTLY FOR COMBOS<br />
          2 PERFECTS IN A ROW RESETS SPEED!<br />
          MISS THE TOWER AND GAME OVER!
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const menu = document.getElementById("menu");
      const startBtn = document.getElementById("start-btn");
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo-text");
      const streakEl = document.getElementById("streak-ui");
      const msgPopup = document.getElementById("msg-popup");
      const container = document.getElementById("game-container");

      // Settings Elements
      const settingsToggle = document.getElementById("settings-toggle");
      const settingsPanel = document.getElementById("settings-panel");
      const closeSettings = document.getElementById("close-settings");
      const bgPicker = document.getElementById("bg-picker");
      const primaryPicker = document.getElementById("primary-picker");
      const soundToggle = document.getElementById("sound-toggle");
      const hapticToggle = document.getElementById("haptic-toggle");

      const BLOCK_HEIGHT = 40;
      const INITIAL_WIDTH = 150;
      const SWING_RANGE = 120;
      const BASE_SPEED = 0.04;
      const STREAK_RESET_THRESHOLD = 2;

      let gameState = "MENU";
      let score = 0;
      let highScore = localStorage.getItem("towerBloxxHS") || 0;
      let blocks = [];
      let cameraY = 0;
      let targetCameraY = 0;
      let currentBlock = null;
      let combo = 0;
      let streak = 0;
      let blocksSinceReset = 0;
      let animationFrame;

      // Settings Logic
      settingsToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle("open");
      });

      closeSettings.addEventListener("click", () => {
        settingsPanel.classList.remove("open");
      });

      bgPicker.addEventListener("input", (e) => {
        document.documentElement.style.setProperty(
          "--bg-color",
          e.target.value,
        );
      });

      primaryPicker.addEventListener("input", (e) => {
        const color = e.target.value;
        document.documentElement.style.setProperty("--primary-color", color);
        document.documentElement.style.setProperty("--text-color", color);
        document.documentElement.style.setProperty("--accent-color", color);
      });

      const triggerHaptic = (duration) => {
        if (hapticToggle.checked && "vibrate" in navigator) {
          navigator.vibrate(duration);
        }
      };

      // Audio System
      let audioCtx = null;
      let masterGain = null;

      const initAudio = () => {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          masterGain = audioCtx.createGain();
          masterGain.gain.setValueAtTime(1, audioCtx.currentTime);
          masterGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      };

      const playTone = (freq, duration) => {
        if (!audioCtx || !soundToggle.checked) return;
        const now = audioCtx.currentTime;

        try {
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.type = "square";
          oscillator.frequency.setValueAtTime(freq, now);
          gainNode.gain.cancelScheduledValues(now);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.15, now + 0.01);
          gainNode.gain.linearRampToValueAtTime(0.001, now + duration);
          oscillator.connect(gainNode);
          gainNode.connect(masterGain);
          oscillator.start(now);
          oscillator.stop(now + duration + 0.1);
        } catch (e) {
          console.warn(e);
        }
      };

      class Block {
        constructor(x, y, width, isSwinging = false, speedIndex = 0) {
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = BLOCK_HEIGHT;
          this.isSwinging = isSwinging;
          this.angle = 0;
          this.speed = BASE_SPEED + speedIndex * 0.0025;
        }

        draw(ctx, offset) {
          const drawX = this.isSwinging
            ? canvas.width / 2 +
              Math.sin(this.angle) * SWING_RANGE -
              this.width / 2
            : this.x;
          const drawY = this.y + offset;

          // Get current primary color from CSS variable
          const primaryColor = getComputedStyle(document.documentElement)
            .getPropertyValue("--primary-color")
            .trim();

          ctx.fillStyle = "rgba(0,0,0,0.1)";
          ctx.fillRect(drawX + 4, drawY + 2, this.width, this.height);
          ctx.fillStyle = primaryColor;
          ctx.fillRect(drawX, drawY, this.width, this.height);
        }

        update() {
          if (this.isSwinging) this.angle += this.speed;
        }

        getBounds() {
          const drawX = this.isSwinging
            ? canvas.width / 2 +
              Math.sin(this.angle) * SWING_RANGE -
              this.width / 2
            : this.x;
          return { x1: drawX, x2: drawX + this.width };
        }
      }

      function init() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        resetGame();
        animate();
      }

      function resetGame() {
        score = 0;
        combo = 0;
        streak = 0;
        blocksSinceReset = 0;
        cameraY = 0;
        targetCameraY = 0;
        blocks = [
          new Block(
            canvas.width / 2 - INITIAL_WIDTH / 2,
            canvas.height - BLOCK_HEIGHT - 20,
            INITIAL_WIDTH,
          ),
        ];
        spawnBlock();
        updateUI();
      }

      function spawnBlock() {
        const lastBlock = blocks[blocks.length - 1];
        currentBlock = new Block(
          0,
          lastBlock.y - BLOCK_HEIGHT,
          lastBlock.width,
          true,
          blocksSinceReset,
        );
      }

      function handleInput() {
        if (settingsPanel.classList.contains("open")) return;
        initAudio();
        if (gameState !== "PLAYING") return;

        const bounds = currentBlock.getBounds();
        const lastBlock = blocks[blocks.length - 1];
        const overlapX1 = Math.max(bounds.x1, lastBlock.x);
        const overlapX2 = Math.min(bounds.x2, lastBlock.x + lastBlock.width);
        const overlapWidth = overlapX2 - overlapX1;

        if (overlapWidth > 0) {
          const diff = Math.abs(
            (bounds.x1 + bounds.x2) / 2 -
              (lastBlock.x + lastBlock.x + lastBlock.width) / 2,
          );
          let points = 100;

          if (diff < 6) {
            combo++;
            streak++;
            points += 200 + combo * 50;
            if (streak >= STREAK_RESET_THRESHOLD) {
              showPopup("STREAK! PACE RESET");
              playTone(800, 0.2);
              streak = 0;
              blocksSinceReset = 0;
            } else {
              showPopup("PERFECT!");
              playTone(600 + combo * 50, 0.12);
            }
            triggerHaptic(50);
            currentBlock.x = lastBlock.x;
            currentBlock.width = lastBlock.width;
          } else {
            combo = 0;
            streak = 0;
            currentBlock.x = overlapX1;
            currentBlock.width = overlapWidth;
            playTone(400, 0.12);
          }
          currentBlock.isSwinging = false;
          blocks.push(currentBlock);
          score += points;
          blocksSinceReset++;
          if (blocks.length > 5) targetCameraY += BLOCK_HEIGHT;
          updateUI();
          spawnBlock();
        } else {
          gameOver();
        }
      }

      function gameOver() {
        gameState = "GAMEOVER";
        playTone(150, 0.6);
        triggerHaptic([200, 100, 200]);
        container.classList.add("shake");
        setTimeout(() => container.classList.remove("shake"), 200);
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("towerBloxxHS", highScore);
        }
        document.getElementById("title").innerText = "GAME OVER";
        document.getElementById("final-stats").style.display = "block";
        document.getElementById("final-blocks").innerText = blocks.length - 1;
        document.getElementById("high-score").innerText = highScore;
        startBtn.innerText = "TRY AGAIN";
        menu.style.display = "flex";
      }

      function updateUI() {
        scoreEl.innerText = score;
        comboEl.innerText = combo > 1 ? `COMBO x${combo}` : "";
        streakEl.innerText = streak > 0 ? `STREAK: ${streak}` : "";
        if (combo > 1) {
          comboEl.style.transform = "scale(1.2)";
          setTimeout(() => (comboEl.style.transform = "scale(1)"), 100);
        }
      }

      function showPopup(txt) {
        msgPopup.innerText = txt;
        msgPopup.style.opacity = 1;
        setTimeout(() => (msgPopup.style.opacity = 0), 1000);
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        cameraY += (targetCameraY - cameraY) * 0.1;
        blocks.forEach((b) => b.draw(ctx, cameraY));
        if (gameState === "PLAYING") {
          currentBlock.update();
          currentBlock.draw(ctx, cameraY);
        }
        animationFrame = requestAnimationFrame(animate);
      }

      startBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        initAudio();
        menu.style.display = "none";
        resetGame();
        gameState = "PLAYING";
      });

      window.addEventListener("mousedown", (e) => {
        if (gameState === "PLAYING") handleInput();
      });

      window.addEventListener(
        "touchstart",
        (e) => {
          if (gameState === "PLAYING") {
            e.preventDefault();
            handleInput();
          }
        },
        { passive: false },
      );

      window.onload = init;
    </script>
  </body>
</html>
