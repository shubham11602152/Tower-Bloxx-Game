<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Tower</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap");
      :root {
        --bg-color: #8bc400;
        --primary-color: #27360d;
        --text-color: #27360d;
        --accent-color: #27360d;
        font-family: sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      body,
      html,
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        overflow: hidden;
        touch-action: manipulation;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
      }

      /* Timer Bar */
      #timer-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 8px;
        background: rgba(0, 0, 0, 0.1);
        z-index: 50;
        visibility: hidden;
      }

      #timer-bar {
        height: 100%;
        width: 100%;
        background: var(--primary-color);
      }

      /* Settings UI */
      #settings-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        color: var(--primary-color);
        transition: transform 0.3s ease;
      }

      #settings-toggle:hover {
        transform: rotate(45deg);
      }

      #settings-panel {
        position: absolute;
        top: 0;
        right: -250px;
        width: 200px;
        height: 100%;
        background: var(--bg-color);
        border-left: 4px solid var(--primary-color);
        z-index: 90;
        padding: 60px 20px 20px 20px;
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      #settings-panel.open {
        right: 0;
      }

      .setting-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .setting-label {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
      }

      input[type="color"] {
        width: 100%;
        height: 30px;
        border: 2px solid var(--primary-color);
        background: none;
        cursor: pointer;
      }

      input[type="checkbox"] {
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: var(--primary-color);
      }

      input[type="text"] {
        width: 100%;
        padding: 8px;
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
        font-family: monospace;
        box-sizing: border-box;
      }

      #swap-colors-btn svg {
        transition: transform 0.3s ease;
      }

      #swap-colors-btn:active svg {
        transform: scale(0.8) rotate(180deg);
      }

      #ui {
        position: absolute;
        top: 30px;
        left: 0;
        right: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        z-index: 10;
      }

      .score-box {
        padding: 10px;
        text-align: center;
      }

      #score {
        font-family: monospace;
        font-weight: bold;
        font-size: 32px;
      }

      #streak-ui {
        font-size: 14px;
        color: var(--accent-color);
        font-weight: bold;
        height: 15px;
      }

      #combo-text {
        color: var(--accent-color);
        font-size: 16px;
        height: 20px;
        font-weight: bold;
      }

      #menu {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 80;
        text-align: center;
        padding: 20px;
        background-image: linear-gradient(
          to top,
          var(--bg-color),
          #00000040
        ); /* Slightly transparent to show tower */
      }

      #menu .menu-content-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      @media (min-width: 500px) {
        #menu .menu-content-container {
          flex-direction: row;
        }
        #menu .menu-content-container > div {
          flex: 1;
        }
      }

      h1 {
        font-family: "silkscreen", sans-serif;
        font-size: 32px;
        margin-bottom: 30px;
        font-weight: 400;
        color: var(--primary-color);
        text-shadow: 2px 2px rgba(0, 0, 0, 0.2);
      }

      .btn {
        background: var(--primary-color);
        color: var(--bg-color);
        padding: 15px 30px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn:active {
        transform: scale(0.95);
      }

      .btn.outlined {
        width: auto;
        padding: 10px 20px;
        font-size: 16px;
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
      }

      .instructions {
        margin-top: 30px;
        font-size: 12px;
        line-height: 1.6;
        color: var(--text-color);
        opacity: 0.8;
      }

      /* Instructions Popup Modal */
      #instructions-popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      #instructions-popup.open {
        display: flex;
      }

      #instructions-popup-content {
        background-image: linear-gradient(
          to bottom right,
          var(--bg-color),
          var(--text-color),
          var(--bg-color)
        );
        border: 4px solid var(--bg-color);
        padding: 24px;
        max-width: 500px;
        text-align: center;
        max-height: 80vh;
        overflow-y: auto;
      }

      #instructions-popup-content h2 {
        font-family: "silkscreen", sans-serif;
        font-weight: 400;
        font-size: 20px;
        margin-bottom: 20px;
        color: var(--bg-color);
      }
      #instructions-popup-content .instructions-items {
        text-align: left;
        margin-left: 16px;
      }

      #instructions-popup-content .instructions-text {
        font-size: 14px;
        line-height: 1;
        color: var(--bg-color);
        margin-bottom: 8px;
      }

      #instructions-popup-content .btn {
        width: 100%;
        max-width: 200px;
        background: var(--bg-color);
        color: var(--text-color);
      }

      #instructions-btn {
        width: 100%;
        margin-top: 20px;
      }
      #instructions-popup-content .btn[id="close-instructions-btn"] {
        margin-top: 20px;
        padding: 10px;
        width: auto;
        margin-left: auto;
      }

      #msg-popup {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--accent-color);
        font-size: 24px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        font-weight: bold;
        text-align: center;
        z-index: 15;
      }

      /* Postcard Preview Styling */
      #postcard-preview-container {
        display: none;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
        width: 100%;
      }

      #postcard-img-preview {
        width: 180px;
        height: 228px;
        border: 4px solid var(--primary-color);
        box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.2);
        image-rendering: auto;
        margin-bottom: 10px;
      }

      .shake {
        animation: shake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-1px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(2px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-4px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(4px, 0, 0);
        }
      }

      #captured-postcard {
        display: none;
      }

      .text-numeric {
        font-family: monospace;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <!-- Timer UI -->
      <div id="timer-container">
        <div id="timer-bar"></div>
      </div>

      <!-- Settings Icon -->
      <button id="settings-toggle" aria-label="Settings">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </button>

      <!-- Settings Panel -->
      <div id="settings-panel">
        <div class="setting-item">
          <span class="setting-label">Display Name</span>
          <input
            type="text"
            id="username-input"
            placeholder="Player Name"
            maxlength="12"
          />
        </div>
        <div class="setting-item">
          <span class="setting-label">Background</span>
          <input type="color" id="bg-picker" value="#8BC400" />
        </div>
        <div class="setting-item">
          <span class="setting-label">Theme Color</span>
          <input type="color" id="primary-picker" value="#27360D" />
        </div>
        <button id="swap-colors-btn" class="btn outlined">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
          SWAP
        </button>
        <div class="setting-item">
          <div class="toggle-row">
            <span class="setting-label">Sound</span>
            <input type="checkbox" id="sound-toggle" checked />
          </div>
        </div>
        <div class="setting-item">
          <div class="toggle-row">
            <span class="setting-label">Haptics</span>
            <input type="checkbox" id="haptic-toggle" checked />
          </div>
        </div>
      </div>

      <div id="ui">
        <div class="score-box">
          <div style="font-size: 10px; margin-bottom: 5px; font-weight: bold">
            SCORE
          </div>
          <div id="score">0</div>
        </div>
        <div id="streak-ui"></div>
        <div id="combo-text"></div>
      </div>

      <div id="msg-popup">PERFECT!</div>

      <canvas id="gameCanvas"></canvas>

      <div id="menu">
        <h1 id="title">RETRO TOWER</h1>

        <div class="menu-content-container">
          <div id="postcard-preview-container">
            <img id="postcard-img-preview" alt="Postcard Preview" />
            <button id="share-btn" class="btn outlined">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              DOWNLOAD
            </button>
          </div>

          <div class="start-stats-container">
            <div id="final-stats" style="display: none; margin-bottom: 20px">
              <p>
                Blocks Stacked:
                <span class="text-numeric" id="final-blocks">0</span>
              </p>
              <p>
                Personal Best:
                <span class="text-numeric" id="high-score">0</span>
              </p>
            </div>
            <button id="start-btn" class="btn">START GAME</button>
            <button id="instructions-btn" class="btn outlined">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
              Instructions
            </button>
          </div>
        </div>

        <!-- <div class="instructions" id="start-instructions">
          CLICK OR TAP TO DROP BLOCK<br /><br />
          LAND PERFECTLY FOR COMBOS<br />
          2 PERFECTS IN A ROW RESETS PACE<br />
          DON'T RUN OUT OF TIME!<br />
          MISS THE TOWER AND GAME OVER!
        </div> -->

        <div class="instructions-container"></div>
      </div>
    </div>

    <!-- Instructions Popup Modal -->
    <div id="instructions-popup">
      <div id="instructions-popup-content">
        <h2>HOW TO PLAY</h2>
        <ul class="instructions-items">
          <li class="instructions-text">CLICK OR TAP TO DROP BLOCK</li>
          <li class="instructions-text">LAND PERFECTLY FOR COMBOS</li>
          <li class="instructions-text">2 PERFECTS IN A ROW RESETS PACE</li>
          <li class="instructions-text">DON'T RUN OUT OF TIME!</li>
          <li class="instructions-text">MISS THE TOWER AND GAME OVER!</li>
        </ul>
        <button id="close-instructions-btn" class="btn">CLOSE</button>
      </div>
    </div>

    <!-- Hidden canvas for postcard generation -->
    <canvas id="captured-postcard" width="449" height="570"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const postcardCanvas = document.getElementById("captured-postcard");
      const pctx = postcardCanvas.getContext("2d");

      const menu = document.getElementById("menu");
      const startBtn = document.getElementById("start-btn");
      const shareBtn = document.getElementById("share-btn");
      const scoreContainer = document.getElementsByClassName("score-box")[0];
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo-text");
      const streakEl = document.getElementById("streak-ui");
      const msgPopup = document.getElementById("msg-popup");
      const container = document.getElementById("game-container");
      const timerContainer = document.getElementById("timer-container");
      const timerBar = document.getElementById("timer-bar");
      const postcardPreviewContainer = document.getElementById(
        "postcard-preview-container",
      );
      const postcardImgPreview = document.getElementById(
        "postcard-img-preview",
      );

      const settingsToggle = document.getElementById("settings-toggle");
      const settingsPanel = document.getElementById("settings-panel");
      const bgPicker = document.getElementById("bg-picker");
      const primaryPicker = document.getElementById("primary-picker");
      const soundToggle = document.getElementById("sound-toggle");
      const hapticToggle = document.getElementById("haptic-toggle");
      const usernameInput = document.getElementById("username-input");
      const swapColorsBtn = document.getElementById("swap-colors-btn");

      const instructionsPopup = document.getElementById("instructions-popup");
      const instructionsBtn = document.getElementById("instructions-btn");
      const closeInstructionsBtn = document.getElementById(
        "close-instructions-btn",
      );

      const BLOCK_HEIGHT = 40;
      const INITIAL_WIDTH = 180;
      const SWING_RANGE = 120;
      const BASE_SPEED = 0.04;
      const STREAK_RESET_THRESHOLD = 2;
      const MAX_DROP_TIME = 3500; // 3.5 seconds

      let gameState = "MENU";
      let score = 0;
      let highScore = localStorage.getItem("towerBloxxHS") || 0;
      let blocks = [];
      let particles = [];
      let cameraY = 0;
      let targetCameraY = 0;
      let cameraZoom = 1;
      let targetZoom = 1;
      let currentBlock = null;
      let combo = 0;
      let streak = 0;
      let blocksSinceReset = 0;
      let animationFrame;
      let dropTimerStart = 0;

      // Particle System for Sparkles
      class Sparkle {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 6;
          this.vy = (Math.random() - 0.5) * 6;
          this.alpha = 1;
          this.size = Math.random() * 10 + 2;
          this.decay = 0.02 + Math.random() * 0.02;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= this.decay;
          this.size *= 0.95;
        }

        draw(ctx, offset) {
          const primaryColor = getComputedStyle(document.documentElement)
            .getPropertyValue("--primary-color")
            .trim();
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.fillStyle = primaryColor;
          ctx.fillRect(this.x, this.y + offset, this.size, this.size);
          ctx.restore();
        }
      }

      function createSparkles(x, y, width) {
        for (let i = 0; i < 20; i++) {
          particles.push(
            new Sparkle(
              x + Math.random() * width,
              y + Math.random() * BLOCK_HEIGHT,
            ),
          );
        }
      }

      function loadSettings() {
        const savedBg = localStorage.getItem("towerBloxx_bg") || "#8BC400";
        const savedPrimary =
          localStorage.getItem("towerBloxx_primary") || "#27360D";
        const savedSound = localStorage.getItem("towerBloxx_sound") !== "false";
        const savedHaptic =
          localStorage.getItem("towerBloxx_haptic") !== "false";
        const savedName = localStorage.getItem("towerBloxx_name") || "";

        bgPicker.value = savedBg;
        primaryPicker.value = savedPrimary;
        soundToggle.checked = savedSound;
        hapticToggle.checked = savedHaptic;
        usernameInput.value = savedName;

        applyColors(savedBg, savedPrimary);
      }

      function applyColors(bg, primary) {
        document.documentElement.style.setProperty("--bg-color", bg);
        document.documentElement.style.setProperty("--primary-color", primary);
        document.documentElement.style.setProperty("--text-color", primary);
        document.documentElement.style.setProperty("--accent-color", primary);

        // Save to localStorage
        localStorage.setItem("towerBloxx_bg", bg);
        localStorage.setItem("towerBloxx_primary", primary);
      }

      settingsToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle("open");
      });

      usernameInput.addEventListener("change", (e) => {
        localStorage.setItem("towerBloxx_name", e.target.value);
      });

      bgPicker.addEventListener("input", (e) => {
        const color = e.target.value;
        document.documentElement.style.setProperty("--bg-color", color);
        localStorage.setItem("towerBloxx_bg", color);
      });

      primaryPicker.addEventListener("input", (e) => {
        const color = e.target.value;
        applyColors(bgPicker.value, color);
        localStorage.setItem("towerBloxx_primary", color);
      });

      swapColorsBtn.addEventListener("click", () => {
        const currentBg = bgPicker.value;
        const currentPrimary = primaryPicker.value;

        // Swap the values
        bgPicker.value = currentPrimary;
        primaryPicker.value = currentBg;

        // Apply the swapped colors
        applyColors(currentPrimary, currentBg);
        triggerHaptic(30);
        playTone(400, 0.1);
      });

      soundToggle.addEventListener("change", (e) =>
        localStorage.setItem("towerBloxx_sound", e.target.checked),
      );
      hapticToggle.addEventListener("change", (e) =>
        localStorage.setItem("towerBloxx_haptic", e.target.checked),
      );

      const triggerHaptic = (duration) => {
        if (hapticToggle.checked && "vibrate" in navigator)
          navigator.vibrate(duration);
      };

      let audioCtx = null;
      let masterGain = null;
      const initAudio = () => {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          masterGain = audioCtx.createGain();
          masterGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
      };

      const playTone = (freq, duration) => {
        if (!audioCtx || !soundToggle.checked) return;
        const now = audioCtx.currentTime;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(freq, now);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
        oscillator.connect(gainNode);
        gainNode.connect(masterGain);
        oscillator.start(now);
        oscillator.stop(now + duration);
      };

      class Block {
        constructor(x, y, width, isSwinging = false, speedIndex = 0) {
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = BLOCK_HEIGHT;
          this.isSwinging = isSwinging;
          this.angle = 0;
          this.speed = BASE_SPEED + speedIndex * 0.003;
        }
        draw(targetCtx, offset) {
          const drawX = this.isSwinging
            ? canvas.width / 2 +
              Math.sin(this.angle) * SWING_RANGE -
              this.width / 2
            : this.x;
          const drawY = this.y + offset;
          const primaryColor = getComputedStyle(document.documentElement)
            .getPropertyValue("--primary-color")
            .trim();
          targetCtx.fillStyle = "rgba(0,0,0,0.1)";
          targetCtx.fillRect(drawX + 4, drawY, this.width, this.height);
          targetCtx.fillStyle = primaryColor;
          targetCtx.fillRect(drawX, drawY, this.width, this.height);
        }
        update() {
          if (this.isSwinging) this.angle += this.speed;
        }
        getBounds() {
          const drawX = this.isSwinging
            ? canvas.width / 2 +
              Math.sin(this.angle) * SWING_RANGE -
              this.width / 2
            : this.x;
          return { x1: drawX, x2: drawX + this.width };
        }
      }

      function init() {
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        loadSettings();
        resetGame();
        animate();
      }

      function resetGame() {
        score = 0;
        combo = 0;
        streak = 0;
        blocksSinceReset = 0;
        cameraY = 0;
        targetCameraY = 0;
        cameraZoom = 1;
        targetZoom = 1;
        blocks = [
          new Block(
            canvas.width / 2 - INITIAL_WIDTH / 2,
            canvas.height - BLOCK_HEIGHT - 40,
            INITIAL_WIDTH,
          ),
        ];
        particles = [];
        spawnBlock();
        updateUI();
        postcardPreviewContainer.style.display = "none";
      }

      function spawnBlock() {
        const lastBlock = blocks[blocks.length - 1];
        currentBlock = new Block(
          0,
          lastBlock.y - BLOCK_HEIGHT,
          lastBlock.width,
          true,
          blocksSinceReset,
        );
        dropTimerStart = Date.now();
        if (gameState === "PLAYING")
          timerContainer.style.visibility = "visible";
      }

      function handleInput() {
        if (settingsPanel.classList.contains("open")) return;
        initAudio();
        if (gameState !== "PLAYING") return;

        const bounds = currentBlock.getBounds();
        const lastBlock = blocks[blocks.length - 1];
        const overlapX1 = Math.max(bounds.x1, lastBlock.x);
        const overlapX2 = Math.min(bounds.x2, lastBlock.x + lastBlock.width);
        const overlapWidth = overlapX2 - overlapX1;

        if (overlapWidth > 5) {
          const diff = Math.abs(
            (bounds.x1 + bounds.x2) / 2 -
              (lastBlock.x + lastBlock.x + lastBlock.width) / 2,
          );
          let points = 100;

          if (diff < 8) {
            combo++;
            streak++;
            points += 200 + combo * 50;

            // Add Sparkles on Perfect Drop
            createSparkles(lastBlock.x, currentBlock.y, lastBlock.width);

            if (streak >= STREAK_RESET_THRESHOLD) {
              showPopup("STREAK! PACE RESET");
              playTone(800, 0.2);
              streak = 0;
              blocksSinceReset = 0;
            } else {
              showPopup("PERFECT!");
              playTone(500 + combo * 60, 0.15);
            }
            triggerHaptic(50);
            currentBlock.x = lastBlock.x;
            currentBlock.width = lastBlock.width;
          } else {
            combo = 0;
            streak = 0;
            currentBlock.x = overlapX1;
            currentBlock.width = overlapWidth;
            playTone(300, 0.15);
          }
          currentBlock.isSwinging = false;
          blocks.push(currentBlock);
          score += points;
          blocksSinceReset++;
          if (blocks.length > 4) targetCameraY += BLOCK_HEIGHT;
          updateUI();
          spawnBlock();
        } else {
          gameOver("MISSED!");
        }
      }

      function gameOver(reason = "GAME OVER") {
        comboEl.innerText = "";
        streakEl.innerText = "";
        scoreEl.innerText = "";
        scoreContainer.style.visibility = "hidden";

        gameState = "GAMEOVER_PAUSE";
        timerContainer.style.visibility = "hidden";
        playTone(100, 0.5);
        triggerHaptic([200, 100, 200]);
        container.classList.add("shake");
        setTimeout(() => container.classList.remove("shake"), 200);

        if (score > highScore) {
          highScore = score;
          localStorage.setItem("towerBloxxHS", highScore);
        }

        // Start Tower Review sequence
        setTimeout(() => {
          gameState = "REVIEWING";
          // Calculate required zoom to fit the whole tower
          const totalTowerHeight = blocks.length * BLOCK_HEIGHT + 150;
          const zoomNeeded = Math.min(1, canvas.height / totalTowerHeight);
          targetZoom = zoomNeeded;

          // Target cameraY should center the bottom of the tower at the bottom of the screen,
          // accounting for the zoom scale centered at top-middle
          targetCameraY = -(
            blocks[0].y -
            (canvas.height / zoomNeeded - BLOCK_HEIGHT * 2)
          );
        }, 800);
      }

      function showResults(reason) {
        document.getElementById("title").innerText = reason;
        document.getElementById("final-stats").style.display = "block";
        document.getElementById("final-blocks").innerText = blocks.length - 1;
        document.getElementById("high-score").innerText = highScore;
        startBtn.innerText = "PLAY AGAIN";

        // Generate and show postcard preview
        generatePostcard(true); // true means just update the preview image
        postcardPreviewContainer.style.display = "flex";

        menu.style.display = "flex";
      }

      function updateUI() {
        scoreEl.innerText = score;
        comboEl.innerText = combo > 1 ? `COMBO x${combo}` : "";
        streakEl.innerText = streak > 0 ? `STREAK: ${streak}` : "";
        scoreContainer.style.visibility = "visible";
      }

      function showPopup(txt) {
        msgPopup.innerText = txt;
        msgPopup.style.opacity = 1;
        setTimeout(() => (msgPopup.style.opacity = 0), 800);
      }

      function generatePostcard(onlyPreview = false) {
        const bg = getComputedStyle(document.documentElement)
          .getPropertyValue("--bg-color")
          .trim();
        const primary = getComputedStyle(document.documentElement)
          .getPropertyValue("--primary-color")
          .trim();
        const timestamp = new Date().toLocaleString();
        const name = usernameInput.value || "ANONYMOUS";

        const HEADER_HEIGHT = 280;

        // Fill Background
        pctx.fillStyle = bg;
        pctx.fillRect(0, 0, postcardCanvas.width, postcardCanvas.height);

        // Draw Decorative Border
        pctx.strokeStyle = primary;
        pctx.lineWidth = 15;
        pctx.strokeRect(
          20,
          20,
          postcardCanvas.width - 40,
          postcardCanvas.height - 40,
        );

        // Draw Tower in Background (fills full frame)
        pctx.save();
        const towerCanvasHeight = postcardCanvas.height - 150;
        const scaleFactor = (postcardCanvas.height * 0.9) / canvas.height;
        const towerHeightInPixels = blocks.length * BLOCK_HEIGHT;
        const postcardZoom = Math.min(
          1,
          towerCanvasHeight / (towerHeightInPixels + 100),
        );

        pctx.translate(postcardCanvas.width / 2, 50);
        pctx.scale(postcardZoom * scaleFactor, postcardZoom * scaleFactor);
        pctx.translate(-canvas.width / 2, 0);

        const postcardOffset =
          -blocks[0].y +
          towerCanvasHeight / (postcardZoom * scaleFactor) -
          BLOCK_HEIGHT;

        blocks.forEach((b) => {
          const drawX = b.x;
          const drawY = b.y + postcardOffset;
          pctx.fillStyle = "rgba(0,0,0,0.1)";
          pctx.fillRect(drawX + 4, drawY, b.width, b.height);
          pctx.fillStyle = primary;
          pctx.fillRect(drawX, drawY, b.width, b.height);
        });
        pctx.restore();

        // Draw Header Text
        pctx.fillStyle = primary;
        pctx.textAlign = "center";
        pctx.font = "30px monospace";
        pctx.fillText("STORY OF THE TOWER", postcardCanvas.width / 2, 100);

        pctx.font = "bold 60px monospace";
        pctx.fillText(score, postcardCanvas.width / 2, 160);

        pctx.font = "12px monospace";
        pctx.fillText(
          `BY: ${name.toUpperCase()}`,
          postcardCanvas.width / 2,
          200,
        );

        // Footer Legibility Gradient
        const footGrad = pctx.createLinearGradient(
          0,
          0,
          postcardCanvas.width,
          postcardCanvas.height,
        );
        footGrad.addColorStop(0, bg);
        footGrad.addColorStop(0.5, "transparent");
        footGrad.addColorStop(1, bg);
        pctx.fillStyle = footGrad;
        pctx.fillRect(0, 0, postcardCanvas.width, postcardCanvas.height);

        // Footer Information
        pctx.fillStyle = primary;
        pctx.textAlign = "left";
        pctx.font = "16px monospace";
        pctx.fillText(
          `${blocks.length - 1} BLOCKS`,
          60,
          postcardCanvas.height - 60,
        );

        pctx.textAlign = "right";
        pctx.fillText(
          timestamp,
          postcardCanvas.width - 60,
          postcardCanvas.height - 60,
        );

        if (onlyPreview) {
          postcardImgPreview.src = postcardCanvas.toDataURL("image/png");
        } else {
          const link = document.createElement("a");
          link.download = `tower-${name.toLowerCase().replace(/\s/g, "-")}.png`;
          link.href = postcardCanvas.toDataURL("image/png");
          link.click();
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === "REVIEWING") {
          cameraY += (targetCameraY - cameraY) * 0.05;
          cameraZoom += (targetZoom - cameraZoom) * 0.05;
          if (
            Math.abs(targetCameraY - cameraY) < 0.5 &&
            Math.abs(targetZoom - cameraZoom) < 0.005
          ) {
            gameState = "MENU";
            showResults(document.getElementById("title").innerText);
          }
        } else {
          cameraY += (targetCameraY - cameraY) * 0.1;
          cameraZoom += (targetZoom - cameraZoom) * 0.1;
        }

        ctx.save();
        ctx.translate(canvas.width / 2, 0);
        ctx.scale(cameraZoom, cameraZoom);
        ctx.translate(-canvas.width / 2, 0);

        blocks.forEach((b) => b.draw(ctx, cameraY));

        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw(ctx, cameraY);
          if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        if (gameState === "PLAYING") {
          const elapsed = Date.now() - dropTimerStart;
          const timeLeft = Math.max(0, MAX_DROP_TIME - elapsed);
          const progress = (timeLeft / MAX_DROP_TIME) * 100;
          timerBar.style.width = progress + "%";
          if (timeLeft <= 0) gameOver("TOO SLOW!");
          currentBlock.update();
          currentBlock.draw(ctx, cameraY);
        }
        ctx.restore();
        animationFrame = requestAnimationFrame(animate);
      }

      startBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        initAudio();
        menu.style.display = "none";
        document.getElementById("final-stats").style.display = "none";
        resetGame();
        gameState = "PLAYING";
      });

      shareBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        generatePostcard(false);
      });

      instructionsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        instructionsPopup.classList.add("open");
      });

      closeInstructionsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        instructionsPopup.classList.remove("open");
      });

      instructionsPopup.addEventListener("click", (e) => {
        if (e.target === instructionsPopup) {
          instructionsPopup.classList.remove("open");
        }
      });

      window.addEventListener("mousedown", (e) => {
        if (gameState === "PLAYING") handleInput();
      });

      window.addEventListener(
        "touchstart",
        (e) => {
          if (gameState === "PLAYING") {
            e.preventDefault();
            handleInput();
          }
        },
        { passive: false },
      );

      window.addEventListener("resize", () => {
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
      });

      window.onload = init;
    </script>
  </body>
</html>
